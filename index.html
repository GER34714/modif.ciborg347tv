<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ciborg 347 TV - Live</title>

    <style>
        :root {
            --primary: #007bff;
            --bg: #0f172a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: #f1f5f9;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        header { padding: 15px; text-align: center; width: 100%; }
        .logo { font-weight: bold; font-size: 1.2rem; color: var(--primary); text-transform: uppercase; letter-spacing: 2px; }

        .container {
            width: 100%;
            max-width: 900px;
            padding: 10px;
        }

        /* MARCO DEL REPRODUCTOR */
        .player-window {
            position: relative;
            width: 100%;
            height: 500px; /* Altura fija para controlar mejor el recorte */
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            border: 2px solid rgba(0, 123, 255, 0.2);
            box-shadow: 0 10px 50px rgba(0,0,0,0.7);
        }

        .player-window iframe {
            position: absolute;
            /* RECORTE AGRESIVO HACIA ARRIBA */
            top: -110px; 
            left: 0;
            width: 100%;
            /* COMPENSACIÓN DE ALTURA */
            height: 750px; 
            border: none;
        }

        .footer-info { margin-top: 30px; text-align: center; font-size: 0.9rem; opacity: 0.7; }
        .brand { color: var(--primary); text-decoration: none; font-weight: bold; }

        @media (max-width: 600px) {
            .player-window { height: 280px; }
            .player-window iframe { top: -95px; height: 500px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Ciborg 347 TV</div>
    </header>

    <main class="container">
        <div class="player-window">
            <iframe 
                src="https://telefullhd.net/tbs-en-vivo/" 
                scrolling="no" 
                allowfullscreen="true"
                allow="autoplay; encrypted-media"
                sandbox="allow-scripts allow-same-origin allow-forms"
                title="Ciborg 347 TV">
            </iframe>
        </div>
    </main>

    <div class="footer-info">
        <p>Trabajo creando y diseñando sitios web</p>
        <p>© 2026 - <a href="https://ciborg347oficial.onrender.com" class="brand">Ciborg 347</a></p>
    </div>

</body>
</html>
