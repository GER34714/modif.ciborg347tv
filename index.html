<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ciborg 347 TV - Pro View</title>

    <style>
        :root {
            --primary: #007bff;
            --bg: #0f172a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: #f1f5f9;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header { padding: 15px; text-align: center; width: 100%; }
        .logo { font-weight: bold; font-size: 1.2rem; color: var(--primary); text-transform: uppercase; letter-spacing: 2px; }

        .container {
            width: 100%;
            max-width: 1000px; /* Un poco más ancho */
            padding: 10px;
        }

        /* VENTANA MÁS GRANDE */
        .player-window {
            position: relative;
            width: 100%;
            height: 700px; /* Aumentamos la altura para que se vea más abajo */
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            border: 2px solid rgba(0, 123, 255, 0.3);
            box-shadow: 0 10px 60px rgba(0,0,0,0.8);
        }

        .player-window iframe {
            position: absolute;
            top: -100px; /* Ajuste del corte superior */
            left: -10%; /* Ajuste lateral por el zoom */
            width: 120%; /* Ancho mayor para compensar el zoom */
            height: 950px; 
            border: none;
            
            /* ZOOM: Agrandamos la web embebida */
            transform: scale(1.2); 
            transform-origin: top center;
        }

        .footer-info { margin-top: 20px; text-align: center; padding: 20px; }
        .brand { color: var(--primary); text-decoration: none; font-weight: bold; }

        /* Ajuste para celulares */
        @media (max-width: 600px) {
            .player-window { height: 500px; }
            .player-window iframe { 
                top: -85px; 
                width: 130%; 
                left: -15%;
                transform: scale(1.3); /* Más zoom en móvil */
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Ciborg 347 TV</div>
    </header>

    <main class="container">
        <div class="player-window">
            <iframe 
                src="https://telefullhd.net/tbs-en-vivo/" 
                scrolling="no" 
                allowfullscreen="true"
                allow="autoplay; encrypted-media"
                sandbox="allow-scripts allow-same-origin allow-forms"
                title="Ciborg 347 TV">
            </iframe>
        </div>
    </main>

    <div class="footer-info">
        <p>Trabajo creando y diseñando sitios web</p>
        <p>© 2026 - <a href="https://ciborg347oficial.onrender.com" class="brand">Ciborg 347</a></p>
    </div>

</body>
</html>
