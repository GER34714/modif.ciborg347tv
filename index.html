<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ciborg 347 TV - Live</title>

    <style>
        :root {
            --primary: #007bff;
            --bg: #0f172a;
            --text: #f1f5f9;
            --desktop-width: 1280px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%;
            overflow-x: hidden;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: Arial, Helvetica, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            padding: 15px 12px;
            text-align: center;
            width: 100%;
        }

        .logo {
            font-weight: bold;
            font-size: 1.2rem;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .container {
            width: 100%;
            max-width: 980px;
            padding: 10px;
            margin: 0 auto;
        }

        .player-window {
            position: relative;
            width: 100%;
            height: 500px;
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            border: 2px solid rgba(0, 123, 255, 0.2);
            box-shadow: 0 10px 50px rgba(0,0,0,0.7);
        }

        .player-window iframe {
            position: absolute;
            top: -110px;
            left: 0;
            width: var(--desktop-width);
            height: 800px;
            border: none;
            transform: scale(0.70);
            transform-origin: top left;
        }

        .footer-info {
            margin-top: 30px;
            padding: 0 16px 24px;
            text-align: center;
            font-size: 0.9rem;
            opacity: 0.7;
        }

        .brand {
            color: var(--primary);
            text-decoration: none;
            font-weight: bold;
        }

        /* TABLET */
        @media (min-width: 601px) and (max-width: 900px) {
            .container {
                max-width: 100%;
                padding: 10px 12px;
            }

            .player-window {
                height: 420px;
            }

            .player-window iframe {
                top: -102px;
                width: 1280px;
                height: 830px;
                transform: scale(0.58);
            }
        }

        /* MOVIL */
        @media (max-width: 600px) {
            header {
                padding: 14px 10px;
            }

            .logo {
                font-size: 1rem;
                letter-spacing: 1.5px;
            }

            .container {
                max-width: 100%;
                padding: 8px 8px 12px;
            }

            .player-window {
                height: 78vh;
                min-height: 520px;
                max-height: 760px;
                border-radius: 14px;
            }

            .player-window iframe {
                top: -78px;
                left: 0;
                width: 1280px;
                height: 1180px;
                transform: scale(0.305);
                transform-origin: top left;
            }

            .footer-info {
                margin-top: 22px;
                font-size: 0.85rem;
                padding-bottom: 20px;
            }
        }

        /* MOVIL CHICO */
        @media (max-width: 420px) {
            .player-window {
                height: 80vh;
                min-height: 500px;
                max-height: 700px;
            }

            .player-window iframe {
                top: -72px;
                width: 1280px;
                height: 1220px;
                transform: scale(0.286);
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Ciborg 347 TV</div>
    </header>

    <main class="container">
        <div class="player-window">
            <iframe 
                src="https://telefullhd.net/tbs-en-vivo/" 
                scrolling="no" 
                allowfullscreen="true"
                allow="autoplay; encrypted-media"
                sandbox="allow-scripts allow-same-origin"
                title="Ciborg 347 TV">
            </iframe>
        </div>
    </main>

    <div class="footer-info">
        <p>Trabajo creando y diseñando sitios web</p>
        <p>© 2026 - <a href="https://ciborg347oficial.onrender.com" class="brand">Ciborg 347</a></p>
    </div>

</body>
</html>
