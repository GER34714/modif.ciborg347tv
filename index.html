<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ciborg 347 TV - Simple y Profesional</title>
    
    <meta property="og:title" content="Ciborg 347 TV - Visualizador Premium">
    <meta property="og:description" content="Accedé a contenido en vivo con la mejor calidad y sin publicidad intrusiva.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://ciborg347oficial.onrender.com">

    <style>
        :root {
            --primary-color: #007bff;
            --bg-dark: #0f172a;
            --bg-light: #f8fafc;
            --text-dark: #1e293b;
            --text-light: #f1f5f9;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            line-height: 1.6;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            transition: background 0.3s;
        }

        body.light-mode {
            background-color: var(--bg-light);
            color: var(--text-dark);
        }

        header {
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
        }

        .logo {
            font-weight: bold;
            font-size: 1.2rem;
            color: var(--primary-color);
            text-transform: uppercase;
        }

        .theme-toggle {
            cursor: pointer;
            background: none;
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .container {
            flex: 1;
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 1rem 2rem 1rem;
        }

        /* Contenedor del Reproductor */
        .player-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }

        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .info-panel {
            margin-top: 2rem;
            text-align: center;
        }

        .info-panel h1 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .instructions {
            font-size: 0.9rem;
            opacity: 0.7;
            margin-bottom: 1.5rem;
        }

        .btn-whatsapp {
            display: inline-flex;
            align-items: center;
            background-color: #25d366;
            color: white;
            padding: 14px 28px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);
            transition: transform 0.2s;
        }

        .btn-whatsapp:active { transform: scale(0.95); }

        .wsp-float {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background-color: #25d366;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 2px 4px 15px rgba(0,0,0,0.4);
            z-index: 100;
        }

        .wsp-float img { width: 30px; }

        footer {
            padding: 2rem 1rem;
            text-align: center;
            font-size: 0.85rem;
            border-top: 1px solid rgba(255,255,255,0.05);
            opacity: 0.8;
        }

        footer span { color: var(--primary-color); font-weight: bold; }

        @media (max-width: 600px) {
            .info-panel h1 { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Ciborg 347 TV</div>
        <button class="theme-toggle" onclick="toggleTheme()">CAMBIAR TEMA</button>
    </header>

    <main class="container">
        <div class="player-wrapper">
            <iframe 
                src="https://telefullhd.net/embed/tnt-sports.php" 
                allowfullscreen="true" 
                scrolling="no" 
                sandbox="allow-scripts allow-same-origin allow-forms"
                title="Reproductor en vivo">
            </iframe>
        </div>

        <div class="info-panel">
            <h1>Señal en Vivo</h1>
            <p class="instructions">Calidad optimizada. Si se detiene, recargá el sitio.</p>
            
            <a href="https://wa.me/TUNUMERO" class="btn-whatsapp" target="_blank">
                REPORTAR CAÍDA DE SEÑAL
            </a>
        </div>
    </main>

    <a href="https://wa.me/TUNUMERO" class="wsp-float" target="_blank">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="Soporte">
    </a>

    <footer>
        <p>Trabajo creando y diseñando sitios web</p>
        <p>© 2026 - Desarrollado por <a href="https://ciborg347oficial.onrender.com" style="color: #007bff; text-decoration: none;">Ciborg 347</a></p>
    </footer>

    <script>
        function toggleTheme() {
            document.body.classList.toggle('light-mode');
        }
    </script>
</body>
</html>
