<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ciborg 347 TV - Live</title>
    <style>
        :root {
            --primary: #007bff;
            --bg: #0f172a;
        }

        body {
            margin: 0;
            background-color: var(--bg);
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        header {
            padding: 15px;
            text-align: center;
            width: 100%;
        }

        .logo {
            font-weight: bold;
            font-size: 1.4rem;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Contenedor para recortar y mostrar solo el video */
        .embed-container {
            width: 95%;
            max-width: 900px;
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            border: 2px solid rgba(0, 123, 255, 0.3);
            box-shadow: 0 10px 50px rgba(0,0,0,0.8);
            position: relative;
        }

        /* El iframe apunta a la web de la opción 2 que es más estable */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .footer-info {
            margin-top: 20px;
            text-align: center;
            font-size: 0.9rem;
            opacity: 0.7;
        }

        .brand {
            color: var(--primary);
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Ciborg 347 TV</div>
    </header>

    <div class="embed-container">
        <iframe 
            src="https://telefullhd.net/tbs-en-vivo/" 
            allowfullscreen="true" 
            scrolling="no" 
            allow="autoplay; encrypted-media"
            sandbox="allow-scripts allow-same-origin allow-forms"
            title="Ciborg 347 TV Player">
        </iframe>
    </div>

    <div class="footer-info">
        <p>Trabajo creando y diseñando sitios web</p>
        <p>© 2026 - <a href="https://ciborg347oficial.onrender.com" class="brand">Ciborg 347</a></p>
    </div>

</body>
</html>
