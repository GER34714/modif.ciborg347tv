<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ciborg 347 TV - Live</title>

    <style>
        :root {
            --primary: #007bff;
            --bg: #0f172a;
            --text: #f1f5f9;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            padding: 15px;
            width: 100%;
            text-align: center;
        }

        .logo {
            font-weight: bold;
            font-size: 1.2rem;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .container {
            width: 95%;
            max-width: 800px;
            margin-top: 10px;
        }

        /* ESTA ES LA MAGIA DEL RECORTE */
        .player-window {
            width: 100%;
            aspect-ratio: 16 / 9; /* Mantiene el formato video */
            background: #000;
            border-radius: 12px;
            overflow: hidden; /* Corta lo que sobra */
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }

        .player-window iframe {
            position: absolute;
            /* Desplazamos el iframe hacia arriba para tapar el logo de la web */
            top: -65px; 
            left: 0;
            width: 100%;
            /* Le damos más altura para que el video no se corte abajo */
            height: calc(100% + 120px); 
            border: none;
        }

        .channel-info {
            margin-top: 20px;
            text-align: center;
        }

        footer {
            margin-top: auto;
            padding: 25px;
            font-size: 0.85rem;
            opacity: 0.7;
        }

        .brand-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Ciborg 347 TV</div>
    </header>

    <main class="container">
        <div class="player-window">
            <iframe 
                src="https://telefullhd.net/tbs-en-vivo/" 
                scrolling="no" 
                allowfullscreen="true"
                sandbox="allow-scripts allow-same-origin allow-forms"
                title="Ciborg 347 TV">
            </iframe>
        </div>

        <div class="channel-info">
            <p>Señal en vivo - Simple y Profesional</p>
        </div>
    </main>

    <footer>
        <p>Trabajo creando y diseñando sitios web</p>
        <p>© 2026 - <a href="https://ciborg347oficial.onrender.com" class="brand-link">Ciborg 347</a></p>
    </footer>

</body>
</html>
