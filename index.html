<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ciborg 347 TV - Home</title>

    <style>
        :root {
            --primary: #007bff;
            --bg: #0f172a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: #f1f5f9;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow: hidden; /* Evita el scroll general de la página */
        }

        header { 
            padding: 10px; 
            text-align: center; 
            width: 100%; 
            display: flex; 
            flex-direction: column; 
            gap: 8px;
            align-items: center;
            z-index: 10;
        }
        
        .logo { font-weight: bold; font-size: 1.1rem; color: var(--primary); text-transform: uppercase; letter-spacing: 2px; }

        .btn-inicio {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 6px 18px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.75rem;
            box-shadow: 0 4px 12px rgba(0, 123, 255, 0.3);
        }

        .container {
            width: 100%;
            max-width: 1000px; 
            padding: 5px;
            flex: 1;
            display: flex;
            justify-content: center;
        }

        /* VISTA PRINCIPAL: Recorta el Footer y el Hero */
        .viewport-crop {
            position: relative;
            width: 100%;
            height: 80vh; /* Altura de la ventana visible */
            background: #fff;
            border-radius: 15px;
            overflow: hidden; /* Esto tapa el footer original */
            border: 2px solid rgba(0, 123, 255, 0.2);
        }

        /* CONTENEDOR DE SCROLL: Permite moverte entre canales */
        .scroll-container {
            width: 100%;
            height: 100%;
            overflow-y: auto; /* Permite escrolear solo la grilla */
            -webkit-overflow-scrolling: touch;
        }

        /* IFRAME: Recorte del Hero superior */
        .player-window iframe {
            display: block;
            width: 155%; 
            height: 2500px; /* Altura suficiente para cargar todos los canales */
            border: none;
            /* RECORTE SUPERIOR: Oculta el Hero/Banner de la web original */
            margin-top: -150px; 
            transform: scale(0.65); 
            transform-origin: top left;
        }

        .footer-info { padding: 10px; text-align: center; font-size: 0.8rem; opacity: 0.7; }
        .brand { color: var(--primary); text-decoration: none; font-weight: bold; }

        /* AJUSTE PARA MÓVILES */
        @media (max-width: 600px) {
            .viewport-crop { height: 75vh; }
            .player-window iframe { 
                transform: scale(0.28); 
                margin-top: -130px; 
                width: 360%; 
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Ciborg 347 TV</div>
        <button class="btn-inicio" onclick="window.location.reload()">Actualizar Lista</button>
    </header>

    <main class="container">
        <div class="viewport-crop">
            <div class="scroll-container">
                <div class="player-window">
                    <iframe 
                        src="https://telefullhd.net/" 
                        scrolling="yes" 
                        allowfullscreen="true"
                        sandbox="allow-scripts allow-same-origin allow-forms"
                        title="Ciborg 347 TV">
                    </iframe>
                </div>
            </div>
        </div>
    </main>

    <div class="footer-info">
        <p>© 2026 - <a href="https://ciborg347oficial.onrender.com" class="brand">Ciborg 347</a></p>
    </div>

</body>
</html>
